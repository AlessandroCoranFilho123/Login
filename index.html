<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/x-icon" href="/imagens/favicon.ico">
</head>

<body>
    <form>
        <h3>Login</h3>
        <label for="Email">Email</label>
        <input type="email" id="Email" autocomplete="email" placeholder="Digite seu Email">
        <label for="Senha">Senha</label>
        <input type="password" id="Senha" autocomplete="current-password" placeholder="Digite sua Senha">

        <div class="container">
            <div class="lembrar">
                <input type="checkbox" id="lembrar-de-mim">
                <label for="lembrar-de-mim">Lembrar de mim</label>
            </div>
            <a href="#" class="esqueceu-senha">Esqueceu a senha?</a>
        </div>
        <button type="submit">Entrar</button>
    </form>
</body>

</html>
